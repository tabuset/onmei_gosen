<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音名⇒鍵盤クイズ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* === アニメーションの定義 === */
    @keyframes flyAwayPrompt {
      0% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
      20% { transform: scale(1.1) translateY(-20px) rotate(-3deg); opacity: 1; }
      100% { transform: scale(0.5) translateY(-300px) rotate(10deg); opacity: 0; }
    }
    .animate-flyAwayPrompt { animation: flyAwayPrompt 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
    
    @keyframes shakePrompt {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-15px) rotate(-3deg); }
      40%, 80% { transform: translateX(15px) rotate(3deg); }
    }
    .animate-shakePrompt { animation: shakePrompt 0.5s ease-in-out forwards; }
    
    @keyframes popUp {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      50% { transform: translateY(-30px) scale(1.2); opacity: 1; }
      100% { transform: translateY(-50px) scale(1); opacity: 0; }
    }
    .animate-popUp { animation: popUp 1.5s ease-out forwards; }
    
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .animate-confetti { animation: confetti linear infinite; }

    /* タイトルの縁取り用 */
    .stroke-text {
      -webkit-text-stroke: 2px #1e3a8a; /* blue-900 */
    }

    /* 鍵盤のホバー＆トランジション */
    .key-white {
      transition: fill 0.2s ease;
    }
    .key-white:hover {
      fill: #eff6ff; /* blue-50 */
    }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen bg-gray-100 p-4 font-sans m-0">

  <div id="game-app" class="w-full max-w-3xl aspect-[4/3] relative overflow-hidden bg-[#87CEEB] rounded-xl shadow-2xl select-none">
    
    <!-- 背景の装飾 -->
    <div class="absolute bottom-16 left-0 right-0 h-40 flex items-end opacity-90 pointer-events-none">

      <div class="w-1/2 h-32 bg-[#32CD32] rounded-t-[150px] -ml-16"></div>
      <div class="w-1/3 h-28 bg-green-500 rounded-t-[120px] -ml-16"></div>
      <div class="w-1/2 h-40 bg-[#32CD32] rounded-t-[180px] -ml-12"></div>

            <polygon points="90,35 100,10 75,25" fill="#FF8C00" stroke="#000" stroke-width="2" />
            <ellipse cx="60" cy="55" rx="25" ry="18" fill="#FFF" />

            <ellipse cx="75" cy="45" rx="8" ry="12" fill="#FFF" stroke="#000" stroke-width="2" />

            <ellipse cx="60" cy="55" rx="4" ry="3" fill="#000" />

            <line x1="20" y1="50" x2="35" y2="52" stroke="#000" stroke-width="1" />

        <div class="text-4xl md:text-6xl font-black text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.4)] text-center stroke-text tracking-wider">
          音名⇒鍵盤クイズ
        </div>
      </div>
      
      <div id="mode-select" class="w-full max-w-md flex flex-col gap-6 px-4 shrink-0">
        <button onclick="showStageSelect('range')" class="py-5 px-6 bg-blue-500 hover:bg-blue-400 text-white text-3xl font-bold rounded-2xl shadow-[0_8px_0_#1e40af] active:translate-y-[8px] active:shadow-none transition-all">
          音域モード
          <span class="block text-sm font-normal mt-2 opacity-90">決まった音域を練習しよう！（全5ステージ）</span>
        </button>
        <button onclick="showStageSelect('challenge')" class="py-5 px-6 bg-orange-500 hover:bg-orange-400 text-white text-3xl font-bold rounded-2xl shadow-[0_8px_0_#c2410c] active:translate-y-[8px] active:shadow-none transition-all">
          チャレンジモード
          <span class="block text-sm font-normal mt-2 opacity-90">徐々に増える音に挑戦！（全12ステージ）</span>
        </button>
      </div>

      <div id="stage-select-range" class="w-full max-w-lg hidden flex-col items-center px-4 pb-10 shrink-0">
        <h3 class="text-2xl font-bold text-blue-800 mb-6 bg-white/90 px-6 py-2 rounded-full shadow-sm border-2 border-blue-200">音域モード</h3>
        <div id="stage-btns-range" class="grid grid-cols-2 gap-3 w-full mb-8"></div>
        <button onclick="showTitleScreen()" class="py-3 px-8 bg-gray-500 hover:bg-gray-400 text-white text-xl font-bold rounded-full shadow-[0_4px_0_#374151] active:translate-y-[4px] active:shadow-none transition-all">タイトルへ戻る</button>
      </div>

      <div id="stage-select-challenge" class="w-full max-w-xl hidden flex-col items-center px-4 pb-10 shrink-0">
        <h3 class="text-2xl font-bold text-orange-800 mb-6 bg-white/90 px-6 py-2 rounded-full shadow-sm border-2 border-orange-200">チャレンジモード</h3>
        <div id="stage-btns-challenge" class="grid grid-cols-2 sm:grid-cols-3 gap-2 w-full mb-8"></div>
        <button onclick="showTitleScreen()" class="py-3 px-8 bg-gray-500 hover:bg-gray-400 text-white text-xl font-bold rounded-full shadow-[0_4px_0_#374151] active:translate-y-[4px] active:shadow-none transition-all">タイトルへ戻る</button>
      </div>

      <!-- データリセットボタン -->
      <button id="btn-data-reset" onclick="showResetModal()" class="absolute bottom-4 right-4 text-blue-800/40 hover:text-red-500 text-xs font-bold transition-colors z-50 hidden underline underline-offset-2">データリセット</button>
    </div>

    <!-- リザルト画面 -->
    <div id="overlay-result" class="absolute inset-0 z-40 flex items-center justify-center bg-black/40 backdrop-blur-sm overflow-hidden hidden">
      <div id="confetti-container" class="absolute inset-0 pointer-events-none z-0 hidden"></div>
      <div id="result-content" class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-md w-full border-4 border-blue-400 transform transition-all relative z-10 mx-4"></div>

    <div id="overlay-allclear" class="absolute inset-0 z-40 flex flex-col items-center justify-center bg-[#fff0f5] hidden overflow-hidden">
       <div id="allclear-confetti" class="absolute inset-0 pointer-events-none z-0"></div>
       <div class="text-5xl md:text-6xl font-black text-pink-500 mb-8 animate-bounce drop-shadow-md z-10 text-center">完全クリア！！</div>
       <div class="text-2xl font-bold text-gray-800 mb-10 z-10 bg-white/80 px-6 py-3 rounded-full shadow-sm">あなたは真の音符マスターです！</div>
       <button class="py-4 px-12 bg-pink-500 hover:bg-pink-400 text-white text-2xl font-bold rounded-full shadow-[0_6px_0_#be185d] active:translate-y-[6px] active:shadow-none transition-all z-10" onclick="showTitleScreen()">

    <!-- データリセット確認モーダル -->
    <div id="overlay-reset-confirm" class="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden">
      <div class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full border-4 border-red-500 mx-4">
        <h2 class="text-2xl font-bold text-red-600 mb-4">ほんとうに データをけす？</h2>
        <p class="text-gray-600 mb-6 font-bold">なまえも スコアも<br/>ぜんぶ きえちゃうよ！</p>
        <div class="flex gap-4">
          <button onclick="hideResetModal()" class="flex-1 py-3 bg-gray-400 hover:bg-gray-500 text-white text-lg font-bold rounded-xl shadow-[0_4px_0_#4b5563] active:translate-y-[4px] active:shadow-none transition-all">やめる</button>
          <button onclick="resetData()" class="flex-1 py-3 bg-red-500 hover:bg-red-600 text-white text-lg font-bold rounded-xl shadow-[0_4px_0_#991b1b] active:translate-y-[4px] active:shadow-none transition-all">けす</button>
        </div>
      </div>
    </div>

    <!-- やり直す確認モーダル -->
    <div id="overlay-retry-modal" class="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden">
      <div class="bg-white p-6 rounded-3xl shadow-2xl text-center max-w-sm w-full border-4 border-gray-400 mx-4">
        <h2 class="text-xl font-bold text-gray-800 mb-6">どうする？</h2>
        <div class="flex flex-col gap-3">
          <button onclick="retryGame()" class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white text-lg font-bold rounded-xl shadow-[0_4px_0_#1d4ed8] active:translate-y-[4px] active:shadow-none transition-all">もう一度最初からプレイする</button>
          <button onclick="returnToStageSelect()" class="w-full py-3 bg-orange-500 hover:bg-orange-600 text-white text-lg font-bold rounded-xl shadow-[0_4px_0_#c2410c] active:translate-y-[4px] active:shadow-none transition-all">ステージ選択画面に戻る</button>
          <button onclick="hideRetryModal()" class="w-full py-3 mt-2 bg-gray-400 hover:bg-gray-500 text-white text-lg font-bold rounded-xl shadow-[0_4px_0_#4b5563] active:translate-y-[4px] active:shadow-none transition-all">キャンセル</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // === データの定義 ===
    const ALL_NOTES = {
      'f3': { id: 'f3', label: '低いファ', freq: 174.61, color: '#FB923C' },
      'g3': { id: 'g3', label: '低いソ', freq: 196.00, color: '#4ADE80' },
      'a3': { id: 'a3', label: '低いラ', freq: 220.00, color: '#60A5FA' },
      'b3': { id: 'b3', label: '低いシ', freq: 246.94, color: '#F87171' },
      'c4': { id: 'c4', label: 'ド', freq: 261.63, color: '#D946EF' },
      'd4': { id: 'd4', label: 'レ', freq: 293.66, color: '#FDE047' },
      'e4': { id: 'e4', label: 'ミ', freq: 329.63, color: '#38BDF8' },

      'g4': { id: 'g4', label: 'ソ', freq: 392.00, color: '#4ADE80' },
      'a4': { id: 'a4', label: 'ラ', freq: 440.00, color: '#60A5FA' },
      'b4': { id: 'b4', label: 'シ', freq: 493.88, color: '#F87171' },
      'c5': { id: 'c5', label: '高いド', freq: 523.25, color: '#D946EF' },
      'd5': { id: 'd5', label: '高いレ', freq: 587.33, color: '#FDE047' },
      'e5': { id: 'e5', label: '高いミ', freq: 659.25, color: '#38BDF8' },
      'f5': { id: 'f5', label: '高いファ', freq: 698.46, color: '#FB923C' },
      'g5': { id: 'g5', label: '高いソ', freq: 783.99, color: '#4ADE80' },
    };

    const RANGE_STAGES = [
      ['c4', 'd4', 'e4'],
      ['f4', 'g4', 'a4'],
      ['b4', 'c5', 'd5'],
      ['e5', 'f5', 'g5'],
      ['g3', 'a3', 'b3'],
    ];

    const CHALLENGE_STAGES = [
      ['c4', 'd4', 'e4', 'f4'], // 1
      ['c4', 'd4', 'e4', 'f4', 'g4'], // 2
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4'], // 3
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4'], // 4
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5'], // 5
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5'], // 6
      ['b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5'], // 7

      let shouldSave = false;

      // ハイスコアの更新

      const currentHigh = state.highScores[key] || 0;
      if (score > currentHigh) {
        state.highScores[key] = score;
        shouldSave = true;
      }

      // チャレンジモードで8000点以上なら次のステージをアンロック
      if (mode === 'challenge' && score >= 8000) {
        const nextStage = stage + 1;
        if (nextStage > state.maxUnlockedChallenge && nextStage <= 12) {
          state.maxUnlockedChallenge = nextStage;
          shouldSave = true;
        }
      }

      if (shouldSave) {

      }

    function startBGM() {
      if (!audioCtx || bgmTimerId) return;
      let nextNoteTime = audioCtx.currentTime + 0.1;
      let current16thNote = 0;

      function playDrum(freq, type, decay, vol, time) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        if(type === 'sine') osc.frequency.exponentialRampToValueAtTime(0.01, time + decay);
        gain.gain.setValueAtTime(vol, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + decay);
        osc.start(time);
        osc.stop(time + decay);
      }

      function scheduleNote() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
          if (current16thNote % 8 === 0) playDrum(150, 'sine', 0.4, 0.6, nextNoteTime);
          else if (current16thNote % 8 === 4) playDrum(250, 'triangle', 0.2, 0.4, nextNoteTime);
          if (current16thNote % 2 === 0) playDrum(6000, 'square', 0.05, 0.05, nextNoteTime);
          
          nextNoteTime += 0.25 * (60.0 / 110);
          current16thNote = (current16thNote + 1) % 16;
        }
        bgmTimerId = setTimeout(scheduleNote, 25.0);
      }
      scheduleNote();
    }

    function stopBGM() {
      if (bgmTimerId) {
        clearTimeout(bgmTimerId);
        bgmTimerId = null;
      }
    }

    function playWrongSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    }

    function playCorrectSound(note) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(note.label + 'ー');
        utterance.lang = 'ja-JP';
        const pitchMap = { 'f3': 0.5, 'g3': 0.6, 'a3': 0.7, 'b3': 0.8, 'c4': 1.0, 'd4': 1.1, 'e4': 1.2, 'f4': 1.3, 'g4': 1.4, 'a4': 1.5, 'b4': 1.6, 'c5': 1.7, 'd5': 1.8, 'e5': 1.9, 'f5': 2.0, 'g5': 2.0 };
        utterance.pitch = pitchMap[note.id] || 1.0;
        window.speechSynthesis.speak(utterance);
      }

      const oscNote = audioCtx.createOscillator();
      const gainNote = audioCtx.createGain();
      oscNote.type = 'sine';
      oscNote.frequency.setValueAtTime(note.freq, now);
      gainNote.gain.setValueAtTime(0.5, now);
      gainNote.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      oscNote.connect(gainNote);
      gainNote.connect(audioCtx.destination);
      oscNote.start(now);
      oscNote.stop(now + 0.6);

      const oscCoin = audioCtx.createOscillator();
      const gainCoin = audioCtx.createGain();
      oscCoin.type = 'square';
      oscCoin.frequency.setValueAtTime(987.77, now);
      oscCoin.frequency.setValueAtTime(1318.51, now + 0.1);
      gainCoin.gain.setValueAtTime(0, now);
      gainCoin.gain.linearRampToValueAtTime(0.2, now + 0.05);
      gainCoin.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      oscCoin.connect(gainCoin);
      gainCoin.connect(audioCtx.destination);
      oscCoin.start(now);
      oscCoin.stop(now + 0.4);
    }

    function playFanfare() {

    function playSuperFanfare() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const notes = [
        { f: 261.63, t: 0 }, { f: 329.63, t: 0.1 }, { f: 392.00, t: 0.2 },
        { f: 523.25, t: 0.3 }, { f: 659.25, t: 0.4 }, { f: 783.99, t: 0.5 }, { f: 1046.50, t: 0.6 }

      notes.forEach(note => {

        osc.frequency.setValueAtTime(note.f, now + note.t);

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(now + note.t);
        osc.stop(now + note.t + 0.5);

      setTimeout(() => {

    // === 鍵盤描画関数 ===
    function determineKeyboardPattern(targetNotes) {
      let hasLow = false;
      let hasHigh = false;
      const lowNotes = ['f3', 'g3', 'a3', 'b3'];
      const highNotes = ['d5', 'e5', 'f5', 'g5'];
      targetNotes.forEach(note => {
        if (lowNotes.includes(note.id)) hasLow = true;
        if (highNotes.includes(note.id)) hasHigh = true;
      });

      if (hasLow && hasHigh) return 4;
      if (hasLow) return 3;
      if (hasHigh) return 2;
      return 1;
    }

    function renderKeyboard(pattern) {
      const g = document.getElementById('keyboard-g');
      const whiteKeys = KEYBOARD_RANGES[pattern];
      const N = whiteKeys.length;
      const svgWidth = 500;
      const svgHeight = 200;
      const W = svgWidth / N;
      
      let html = '';
      
      whiteKeys.forEach((keyId, i) => {
        html += `<rect id="key-${keyId}" x="${i * W}" y="0" width="${W}" height="${svgHeight}" class="key-white cursor-pointer touch-none" fill="#FFF" stroke="#333" stroke-width="2" rx="4" onpointerdown="handleGuess('${keyId}', event)" />`;
      });
      
      const blackKeyWidth = W * 0.6;
      const blackKeyHeight = svgHeight * 0.55;
      whiteKeys.forEach((keyId, i) => {
        if (i === N - 1) return;
        const baseNote = keyId.charAt(0);
        if (['c', 'd', 'f', 'g', 'a'].includes(baseNote)) {
          const bx = (i + 1) * W - blackKeyWidth / 2;
          html += `<rect x="${bx}" y="0" width="${blackKeyWidth}" height="${blackKeyHeight}" fill="#111" stroke="#000" stroke-width="1" rx="3" pointer-events="none" />`;
          html += `<rect x="${bx + 2}" y="0" width="${blackKeyWidth - 4}" height="${blackKeyHeight - 8}" fill="#333" rx="2" pointer-events="none" />`;
        }
      });
      
      g.innerHTML = html;
    }

    function renderTargetNote(note) {
      const g = document.getElementById('target-note-g');
      if (!note) {
        g.innerHTML = '';
        return;
      }
      
      const pattern = state.keyboardPattern;
      const whiteKeys = KEYBOARD_RANGES[pattern];
      const N = whiteKeys.length;
      const svgWidth = 500;
      const svgHeight = 200;
      const W = svgWidth / N;
      
      const noteIndex = whiteKeys.indexOf(note.id);
      if (noteIndex !== -1) {
        const cx = noteIndex * W + W / 2;
        const cy = svgHeight * 0.78;
        
        const shortLabel = note.label.replace('高い', '').replace('低い', '');
        g.innerHTML = `
          <circle cx="${cx}" cy="${cy}" r="${W * 0.35}" fill="${note.color}" stroke="#fff" stroke-width="3" filter="drop-shadow(0 4px 3px rgb(0 0 0 / 0.3))" />
          <text x="${cx}" y="${cy + W * 0.05}" font-size="${W * 0.3}" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif">${shortLabel}</text>
        `;
      }
    }

        state.startTime += (Date.now() - state.pauseTime);
        updatePointsDisplay();
      }
    }

    window.retryGame = function() {
      hideRetryModal();
      stopBGM();
      if(rAF_TimerId) cancelAnimationFrame(rAF_TimerId);
      startGame(state.mode, state.stage);
    }

    window.returnToStageSelect = function() {
      hideRetryModal();
      stopBGM();
      if(rAF_TimerId) cancelAnimationFrame(rAF_TimerId);
      showTitleScreen();
      showStageSelect(state.mode); // ステージ選択画面を開いた状態にする
    }


    // === ゲームロジック ===
    function generateQuestions(mode, stage) {
      const stageNotesArr = mode === 'range' ? RANGE_STAGES[stage - 1] : CHALLENGE_STAGES[stage - 1];
      const targetNotes = stageNotesArr.map(id => ALL_NOTES[id]);
      
      let list = [];
      
      if (targetNotes.length > 10) {
        let newNotes = [];
        let oldNotes = [...targetNotes];
        
        if (mode === 'challenge' && stage > 1) {
          const prevStageNotesArr = CHALLENGE_STAGES[stage - 2];
          newNotes = targetNotes.filter(n => !prevStageNotesArr.includes(n.id));
          oldNotes = targetNotes.filter(n => prevStageNotesArr.includes(n.id));
        }
        
        oldNotes.sort(() => Math.random() - 0.5);
        
        let selectedNotes = [...newNotes];
        const needed = 10 - selectedNotes.length;
        selectedNotes = selectedNotes.concat(oldNotes.slice(0, needed));
        
        selectedNotes.sort(() => Math.random() - 0.5);
        list = selectedNotes;
        
      } else {
        let pool = [...targetNotes];
        
        for (let i = 0; i < 10; i++) {
          if (pool.length === 0) {
            pool = [...targetNotes];
          }
          
          let validPool = pool;
          if (i > 0) {
            const prevId = list[i - 1].id;
            validPool = pool.filter(n => n.id !== prevId);
            
            if (validPool.length === 0) {
               pool = [...targetNotes];
               validPool = pool.filter(n => n.id !== prevId);
            }
          }
          
          const pickedIndex = Math.floor(Math.random() * validPool.length);
          const picked = validPool[pickedIndex];
          list.push(picked);
          
          const removeIndex = pool.findIndex(n => n.id === picked.id);
          if (removeIndex !== -1) {
            pool.splice(removeIndex, 1);
          }
        }
      }
      return list;
    }

    function updatePointsDisplay() {
      // ポーズ中なら更新を止める
      if (state.isPaused) return;

      if (state.gameState === 'playing' && state.showNote && state.feedback === null) {
        const elapsed = Date.now() - state.startTime;
        const nextPoints = Math.max(0, 1000 - Math.floor(elapsed / 10));
        
        const el = document.getElementById('ui-points');
        el.innerText = String(nextPoints).padStart(3, '0');
        el.className = nextPoints < 300 
          ? 'bg-red-500 text-white font-bold px-3 py-0.5 rounded shadow-inner min-w-[3rem] text-center transition-colors' 
          : 'bg-orange-400 text-white font-bold px-3 py-0.5 rounded shadow-inner min-w-[3rem] text-center transition-colors';
        
        if (nextPoints <= 0) {
          state.currentPoints = 0;
          handleTimeout();
        } else {
          rAF_TimerId = requestAnimationFrame(updatePointsDisplay);
        }
      }
    }

    window.startGame = function(mode, targetStage) {
      initAudio();
      document.getElementById('overlay-title').classList.add('hidden');
      document.getElementById('overlay-result').classList.add('hidden');
      document.getElementById('overlay-allclear').classList.add('hidden');
      
      // やり直すボタンを表示
      document.getElementById('btn-retry-container').classList.remove('hidden');

      state.mode = mode;
      state.stage = targetStage;
      state.score = 0;
      state.questionCount = 1;
      state.gameState = 'playing';
      state.feedback = null;
      state.showNote = false;
      state.isPaused = false;
      
      const stageDisplay = mode === 'range' ? `音域 ${state.stage}` : `Ch. ${state.stage}`;
      document.getElementById('ui-stage').innerText = stageDisplay;
      updateScore(0);
      
      const stageNotesArr = mode === 'range' ? RANGE_STAGES[targetStage - 1] : CHALLENGE_STAGES[targetStage - 1];
      const targetNotes = stageNotesArr.map(id => ALL_NOTES[id]);
      state.questionList = generateQuestions(mode, targetStage);
      
      state.keyboardPattern = determineKeyboardPattern(targetNotes);
      document.getElementById('keyboard-container').classList.remove('hidden');
      
      // 最初はお題ボックスは隠しておく
      document.getElementById('prompt-container').classList.add('hidden');
      
      renderKeyboard(state.keyboardPattern);
      renderTargetNote(null);
      
      startBGM();
      setCatMessage('第1問！');
      
      setTimeout(() => {
        // もしポーズされていたら表示処理を止めるなどの安全策（今回は1秒なので簡易的に）
        if(state.gameState !== 'playing') return;

        state.currentNote = state.questionList[0];
        state.showNote = true;
        
        document.getElementById('prompt-container').classList.remove('hidden');
        setPromptBox(state.currentNote.label, 'この音はどこ？', state.currentNote.color);
        setCatMessage('どこかな？');
        
        state.startTime = Date.now();
        if(rAF_TimerId) cancelAnimationFrame(rAF_TimerId);
        updatePointsDisplay();
      }, 1000);
    }

    window.handleGuess = function(keyId, event) {
      if (event) {
        event.preventDefault(); // タッチ時のスクロールやダブルタップの誤爆を防ぐ
      }

      if (state.gameState !== 'playing' || state.isPaused || state.feedback !== null || !state.showNote) return;
      
      const elapsed = Date.now() - state.startTime;
      const actualPoints = Math.max(0, 1000 - Math.floor(elapsed / 10));
      const isCorrect = keyId === state.currentNote.id;
      
      state.feedback = isCorrect ? 'correct' : 'wrong';
      renderTargetNote(state.currentNote);
      const clickedKey = document.getElementById(`key-${keyId}`);
      
      if (isCorrect) {
        playCorrectSound(ALL_NOTES[keyId]);
        state.score += actualPoints;
        updateScore(state.score);
        showAddedScore(actualPoints, clickedKey);
        setCatMessage('正解！', true, false);
        
        if (clickedKey) clickedKey.style.fill = '#bbf7d0'; 
        document.getElementById('prompt-box').classList.add('animate-flyAwayPrompt');
      } else {
        playWrongSound();
        setCatMessage('残念！', false, true);
        
        if (clickedKey) clickedKey.style.fill = '#fecaca'; 
        const correctKey = document.getElementById(`key-${state.currentNote.id}`);
        if (correctKey) correctKey.style.fill = '#bfdbfe'; 
        
        document.getElementById('prompt-box').classList.add('animate-shakePrompt');
      }
      scheduleNextQuestion();
    }

    function handleTimeout() {
      state.feedback = 'timeout';
      playWrongSound();
      setCatMessage('時間切れ！', false, true);
      
      renderTargetNote(state.currentNote);
      document.getElementById('prompt-box').classList.add('animate-shakePrompt');
      
      scheduleNextQuestion();
    }

    function scheduleNextQuestion() {
      setTimeout(() => {
        if (state.gameState !== 'playing') return;

        if (state.questionCount >= 10) {
          showResultScreen();
        } else {
          state.questionCount++;
          state.feedback = null;
          state.showNote = false;
          document.getElementById('ui-added-score').classList.add('hidden');
          renderTargetNote(null);
          resetKeyboardColors();
          
          document.getElementById('prompt-container').classList.add('hidden');
          setCatMessage(`第${state.questionCount}問！`);
          
          setTimeout(() => {
            if (state.gameState !== 'playing') return;

            state.currentNote = state.questionList[state.questionCount - 1];
            state.showNote = true;
            
            document.getElementById('prompt-container').classList.remove('hidden');
            setPromptBox(state.currentNote.label, 'この音はどこ？', state.currentNote.color);
            setCatMessage('どこかな？');
            
            state.startTime = Date.now();
            if(rAF_TimerId) cancelAnimationFrame(rAF_TimerId);
            updatePointsDisplay();
          }, 1000);
        }
      }, 1500);
    }

    function showResultScreen() {
      state.gameState = 'result';
      stopBGM();
      document.getElementById('keyboard-container').classList.add('hidden');
      document.getElementById('prompt-container').classList.add('hidden');
      document.getElementById('btn-retry-container').classList.add('hidden');
      
      // 今回のスコア結果をセーブ・ハイスコア更新
      saveProgress(state.mode, state.stage, state.score);

      const elResult = document.getElementById('overlay-result');
      const elResultContent = document.getElementById('result-content');
      const elConfetti = document.getElementById('confetti-container');
      
      elResult.classList.remove('hidden');
      const clearScore = 8000;
      const superScore = 9000;
      
      const modeName = state.mode === 'range' ? '音域モード' : 'チャレンジモード';
      let html = `
        <h2 class="text-2xl md:text-3xl font-black text-gray-800 mb-2">${modeName}<br/>ステージ ${state.stage} 終了！</h2>
        <div class="text-6xl font-black text-orange-500 mb-4">${state.score} <span class="text-2xl text-gray-600">点</span></div>
      `;
      
      if (state.score >= clearScore) {
        let btnColor = '';
        if (state.score >= superScore) {
          playSuperFanfare();
          elConfetti.innerHTML = Array.from({length: 60}).map(() => {
            const c = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#FFD700'][Math.floor(Math.random() * 6)];
            return `<div class="absolute w-3 h-3 animate-confetti" style="left: ${Math.random() * 100}%; top: -10%; background-color: ${c}; animation-delay: ${Math.random() * 3}s; animation-duration: ${1.5 + Math.random() * 2}s; border-radius: ${Math.random() > 0.5 ? '50%' : '0'}"></div>`;
          }).join('');
          elConfetti.classList.remove('hidden');
          
          html += `<p class="text-2xl font-black text-yellow-500 mb-6 animate-pulse">大・大・大成功！！<br/>パーフェクト級だね！</p>`;
          btnColor = 'bg-yellow-400 hover:bg-yellow-500 border-b-4 border-yellow-600 shadow-[0_4px_0_#ca8a04] active:translate-y-[4px] active:shadow-none';
        } else {
          playFanfare();
          elConfetti.classList.add('hidden');
          html += `<p class="text-xl font-bold text-green-500 mb-6">目標の${clearScore}点達成！<br/>おめでとう！</p>`;
          btnColor = 'bg-green-500 hover:bg-green-600 border-b-4 border-green-700 shadow-[0_4px_0_#15803d] active:translate-y-[4px] active:shadow-none';
        }
        if (state.mode === 'range') {
          html += `<button class="w-full py-4 ${btnColor} text-white text-2xl font-bold rounded-xl transition-all" onclick="showTitleScreen()">タイトルへ戻る</button>`;
        } else {
          const btnText = state.stage < 12 ? '次のステージへ！' : 'エンディングへ！';
          html += `<button class="w-full py-4 ${btnColor} text-white text-2xl font-bold rounded-xl transition-all" onclick="handleNextStage()">${btnText}</button>`;
        }
      } else {
        playFailSound();
        elConfetti.classList.add('hidden');
        html += `
          <p class="text-lg font-bold text-red-500 mb-6">${clearScore}点に届かなかった...<br/>もう一度挑戦しよう！</p>
          <div class="flex flex-col gap-3">
            <button class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold rounded-xl shadow-[0_4px_0_#1d4ed8] active:translate-y-[4px] active:shadow-none transition-all" onclick="startGame('${state.mode}', ${state.stage})">もういちど挑戦する</button>
            <button class="w-full py-3 bg-gray-400 hover:bg-gray-500 text-white text-xl font-bold rounded-xl shadow-[0_4px_0_#4b5563] active:translate-y-[4px] active:shadow-none transition-all" onclick="showTitleScreen()">タイトルへ戻る</button>
          </div>
        `;
      }
      elResultContent.innerHTML = html;
    }

    window.handleNextStage = function() {
      if (state.mode === 'challenge') {
        if (state.stage < 12) {
          startGame('challenge', state.stage + 1);
        } else {
          showAllClearScreen();
        }
      }
    }

    function showAllClearScreen() {
      document.getElementById('overlay-result').classList.add('hidden');
      const elAllClear = document.getElementById('overlay-allclear');
      elAllClear.classList.remove('hidden');
      const elConfetti = document.getElementById('allclear-confetti');
      elConfetti.innerHTML = Array.from({length: 150}).map(() => {
        const c = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#FFD700', '#FF1493', '#00FFFF'][Math.floor(Math.random() * 8)];
        return `<div class="absolute w-4 h-4 animate-confetti" style="left: ${Math.random() * 100}%; top: -10%; background-color: ${c}; animation-delay: ${Math.random() * 5}s; animation-duration: ${2 + Math.random() * 3}s; border-radius: ${Math.random() > 0.5 ? '50%' : '0'}"></div>`;
      }).join('');
      
      playSuperFanfare();
    }
  </script>
</body>
</html>

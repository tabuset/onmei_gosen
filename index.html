  <link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet">
  <style>
    /* === アニメーションの定義 === */
    @keyframes flyCurve {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
      10% { transform: translate(0, 10px) scale(1.05) rotate(0deg); opacity: 1; } 
      100% { transform: translate(var(--fly-x, 0px), -600px) scale(0.6) rotate(var(--fly-rot, 0deg)); opacity: 0; }
    }
    .animate-flyAway { animation: flyCurve 1.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
    
    @keyframes shakeNote {
      0%, 100% { transform: translateX(0) scale(1); }
      15%, 45%, 75% { transform: translateX(-15px) scale(1.1) rotate(-8deg); }
      30%, 60%, 90% { transform: translateX(15px) scale(1.1) rotate(8deg); }
    }
    .animate-shakeNote { animation: shakeNote 1s ease-in-out infinite; }
    
    /* 風船の横から上に飛び出すように */
    @keyframes popUp {
      0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
      50% { transform: translate(-50%, -30px) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -50px) scale(1); opacity: 0; }
    }
    .animate-popUp { animation: popUp 1.5s ease-out forwards; }
    
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .animate-confetti { animation: confetti linear infinite; }

    /* タイトルの縁取り用 */
    .stroke-text {
      -webkit-text-stroke: 2px #1e3a8a; /* blue-900 */
    }
  </style>
</head>

  <script>
    // === データの定義 ===
    const ALL_NOTES = {
      'g3': { id: 'g3', label: '低いソ', y: 212.5, freq: 196.00, color: '#4ADE80' },
      'a3': { id: 'a3', label: '低いラ', y: 200,   freq: 220.00, color: '#60A5FA' },
      'b3': { id: 'b3', label: '低いシ', y: 187.5, freq: 246.94, color: '#F87171' },
      'c4': { id: 'c4', label: 'ド',   y: 175,   freq: 261.63, color: '#D946EF' },
      'd4': { id: 'd4', label: 'レ',   y: 162.5, freq: 293.66, color: '#FDE047' },
      'e4': { id: 'e4', label: 'ミ',   y: 150,   freq: 329.63, color: '#38BDF8' },
      'f4': { id: 'f4', label: 'ファ', y: 137.5, freq: 349.23, color: '#FB923C' },
      'g4': { id: 'g4', label: 'ソ',   y: 125,   freq: 392.00, color: '#4ADE80' },
      'a4': { id: 'a4', label: 'ラ',   y: 112.5, freq: 440.00, color: '#60A5FA' },
      'b4': { id: 'b4', label: 'シ',   y: 100,   freq: 493.88, color: '#F87171' },
      'c5': { id: 'c5', label: '高いド',   y: 87.5,  freq: 523.25, color: '#D946EF' },
      'd5': { id: 'd5', label: '高いレ',   y: 75,    freq: 587.33, color: '#FDE047' },
      'e5': { id: 'e5', label: '高いミ',   y: 62.5,  freq: 659.25, color: '#38BDF8' },
      'f5': { id: 'f5', label: '高いファ', y: 50,    freq: 698.46, color: '#FB923C' },
      'g5': { id: 'g5', label: '高いソ',   y: 37.5,  freq: 783.99, color: '#4ADE80' },
    };

    const RANGE_STAGES = [
      ['c4', 'd4', 'e4'],
      ['f4', 'g4', 'a4'],
      ['b4', 'c5', 'd5'],
      ['e5', 'f5', 'g5'],
      ['g3', 'a3', 'b3'],
    ];

    const CHALLENGE_STAGES = [
      ['c4', 'd4', 'e4', 'f4'], // 1
      ['c4', 'd4', 'e4', 'f4', 'g4'], // 2
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4'], // 3
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4'], // 4
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5'], // 5
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5'], // 6
      ['b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5'], // 7
      ['b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5'], // 8
      ['a3', 'b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5'], // 9
      ['a3', 'b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5', 'f5'], // 10
      ['g3', 'a3', 'b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5', 'f5'], // 11
      ['g3', 'a3', 'b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5', 'f5', 'g5'], // 12
    ];

    // === 状態管理 ===
    const state = {
      mode: 'range',
      stage: 1,
      gameState: 'title', // title, stageSelect, intro, playing, result
      questionCount: 0,
      score: 0,
      currentPoints: 0,
      currentNote: null,
      showNote: false,
      feedback: null,
      questionList: [],
      startTime: null,
      maxUnlockedChallenge: 1,
      playerName: '',
      scores: {
        range: Array(5).fill(0),
        challenge: Array(12).fill(0)
      }
    };

    let audioCtx = null;
    let bgmTimerId = null;
    let rAF_TimerId = null;
    
    // ポーズとイントロ用の変数
    let isPaused = false;
    let pauseTime = 0;
    let introTimerId = null;

    // === セーブデータ管理 ===
    function loadProgress() {
      try {
        const data = JSON.parse(localStorage.getItem('name2staff_v3_data'));
        if (data) {
          state.maxUnlockedChallenge = data.maxUnlockedChallenge || 1;
          state.playerName = data.playerName || '';
          if (data.scores) {
            state.scores.range = data.scores.range || Array(5).fill(0);
            state.scores.challenge = data.scores.challenge || Array(12).fill(0);
          }
        }
      } catch (e) {
        console.warn("セーブデータの読み込みに失敗しました", e);
      }
    }

    function saveProgress() {
      try {
        localStorage.setItem('name2staff_v3_data', JSON.stringify({
          maxUnlockedChallenge: state.maxUnlockedChallenge,
          playerName: state.playerName,
          scores: state.scores
        }));
      } catch (e) {}
    }

    window.clearData = function() {
      if (confirm("なまえやゲームの記録をすべて消去しますか？")) {

    // === オーディオ関連 ===
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function startBGM() {
      if (!audioCtx || bgmTimerId) return;
      let nextNoteTime = audioCtx.currentTime + 0.1;
      let current16thNote = 0;

      function playDrum(freq, type, decay, vol, time) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        if(type === 'sine') osc.frequency.exponentialRampToValueAtTime(0.01, time + decay);
        gain.gain.setValueAtTime(vol, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + decay);
        osc.start(time);
        osc.stop(time + decay);
      }

      function scheduleNote() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
          if (current16thNote % 8 === 0) playDrum(150, 'sine', 0.4, 0.6, nextNoteTime);
          else if (current16thNote % 8 === 4) playDrum(250, 'triangle', 0.2, 0.4, nextNoteTime);
          if (current16thNote % 2 === 0) playDrum(6000, 'square', 0.05, 0.05, nextNoteTime);
          
          nextNoteTime += 0.25 * (60.0 / 110);
          current16thNote = (current16thNote + 1) % 16;
        }
        bgmTimerId = setTimeout(scheduleNote, 25.0);
      }
      scheduleNote();
    }

    function stopBGM() {
      if (bgmTimerId) {
        clearTimeout(bgmTimerId);
        bgmTimerId = null;
      }
    }

    function playWrongSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    }

    // ピアノ音と読み上げを鳴らす共通処理
    function playNoteAudioAndSpeech(note) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;

      // 1. 読み上げ音声 (日本語)
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(note.label + 'ー');
        utterance.lang = 'ja-JP';
        const pitchMap = { 'g3': 0.6, 'a3': 0.7, 'b3': 0.8, 'c4': 1.0, 'd4': 1.1, 'e4': 1.2, 'f4': 1.3, 'g4': 1.4, 'a4': 1.5, 'b4': 1.6, 'c5': 1.7, 'd5': 1.8, 'e5': 1.9, 'f5': 2.0, 'g5': 2.0 };
        utterance.pitch = pitchMap[note.id] || 1.0;
        window.speechSynthesis.speak(utterance);
      }

      // 2. ピアノの単音風サウンド（サイン波）
      const oscNote = audioCtx.createOscillator();
      const gainNote = audioCtx.createGain();
      oscNote.type = 'sine';
      oscNote.frequency.setValueAtTime(note.freq, now);
      gainNote.gain.setValueAtTime(0.5, now);
      gainNote.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      oscNote.connect(gainNote);
      gainNote.connect(audioCtx.destination);
      oscNote.start(now);
      oscNote.stop(now + 0.6);
    }

    function playCorrectSound(note) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      
      // 読み上げとピアノ音
      playNoteAudioAndSpeech(note);

      // 正解時のピコーンというコイン音を追加
      const oscCoin = audioCtx.createOscillator();
      const gainCoin = audioCtx.createGain();
      oscCoin.type = 'square';
      oscCoin.frequency.setValueAtTime(987.77, now);
      oscCoin.frequency.setValueAtTime(1318.51, now + 0.1);
      gainCoin.gain.setValueAtTime(0, now);
      gainCoin.gain.linearRampToValueAtTime(0.2, now + 0.05);
      gainCoin.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      oscCoin.connect(gainCoin);
      gainCoin.connect(audioCtx.destination);
      oscCoin.start(now);
      oscCoin.stop(now + 0.4);
    }

    function playFanfare() {
      if (!audioCtx) return;
      [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => {
        setTimeout(() => {
          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
          osc.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.4);
        }, i * 150);
      });
    }

    function playSuperFanfare() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const notes = [
        { f: 261.63, t: 0 }, { f: 329.63, t: 0.1 }, { f: 392.00, t: 0.2 },
        { f: 523.25, t: 0.3 }, { f: 659.25, t: 0.4 }, { f: 783.99, t: 0.5 }, { f: 1046.50, t: 0.6 }
      ];
      notes.forEach(note => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(note.f, now + note.t);
        gainNode.gain.setValueAtTime(0, now + note.t);
        gainNode.gain.linearRampToValueAtTime(0.2, now + note.t + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + note.t + 0.5);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(now + note.t);
        osc.stop(now + note.t + 0.5);
      });
      setTimeout(() => {
        [523.25, 659.25, 783.99, 1046.50].forEach(f => {
          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(f, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
          osc.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 1.5);
        });
      }, 700);
    }

    function playFailSound() {

    function generateBalloons(stageNotes) {
      const container = document.getElementById('balloons-container');
      const staffContainer = document.getElementById('staff-container');
      
      let rows = [];
      let currentRow = [];
      for (let i = 0; i < stageNotes.length; i++) {
        const note = stageNotes[i];
        currentRow.push(note);
        
        const isE = note.id.startsWith('e');
        const isB = note.id.startsWith('b');
        const remaining = stageNotes.length - 1 - i;
        
        if ((isE || isB) && currentRow.length >= 4 && remaining >= 4) {
          rows.push(currentRow);
          currentRow = [];
        }
      }
      if (currentRow.length > 0) {
        rows.push(currentRow);
      }
      
      rows.reverse();
      
      let scale = 1;
      let staffTop = '20%';
      let textScale = 1;
      let mt = 0;
      
      if (rows.length >= 3) {
        scale = 0.45;
        staffTop = '2%';
        textScale = 0.65;
        mt = -45;
      } else if (rows.length === 2) {
        scale = 0.65;
        staffTop = '5%';
        textScale = 0.8;
        mt = -30;
      } else if (rows[0].length >= 8) {
        scale = 0.8;
        staffTop = '10%';
        textScale = 0.9;
      } else if (rows[0].length >= 6) {
        scale = 0.95;
        staffTop = '15%';
      }
      
      if (staffContainer) {
        staffContainer.style.top = staffTop;
        staffContainer.style.transform = `scale(${textScale})`;
        staffContainer.style.transformOrigin = 'top center';
      }
      
      const maxNotesInRow = Math.max(...rows.map(r => r.length));
      let ml = 0;
      if (maxNotesInRow >= 7) ml = -15;
      else if (maxNotesInRow >= 5) ml = -5;

      const containerWidth = container.clientWidth || window.innerWidth;
      const baseWidth = 112; 
      const estimatedWidth = baseWidth + (baseWidth + ml) * (maxNotesInRow - 1);
      const scaledWidth = estimatedWidth * scale;
      
      if (scaledWidth > containerWidth * 0.95) {
        scale = scale * ((containerWidth * 0.95) / scaledWidth);
      }
      
      const balloonsHtml = rows.map((rowNotes, rowIndex) => {
        const rowHtml = rowNotes.map((note, index) => {
          let linesHtml = '';
          let clefHtml = '';
          
          if (index === 0) {
            [50, 75, 100, 125, 150].forEach(y => {
              linesHtml += `<line x1="-3000" y1="${y}" x2="3000" y2="${y}" stroke="#000" stroke-width="3" opacity="0.8" />`;
            });
            clefHtml = `<text x="-50" y="140" font-size="80" font-family="'Noto Music', 'Segoe UI Symbol', 'Apple Symbols', serif" fill="#000" opacity="0.8">𝄞</text>`;
          }
          
          let noteHtml = '';
          const ledgerLines = [];
          if (note.y >= 175) ledgerLines.push(175);
          if (note.y >= 200) ledgerLines.push(200);
          if (note.y <= 25) ledgerLines.push(25);
          ledgerLines.forEach(ly => {
            noteHtml += `<line x1="30" y1="${ly}" x2="90" y2="${ly}" stroke="#000" stroke-width="4" />`;
          });
          noteHtml += `<ellipse cx="60" cy="${note.y}" rx="14" ry="10" fill="none" stroke="#000" stroke-width="4" transform="rotate(-15, 60, ${note.y})" />`;

          const hex = note.color.replace('#', '');
          const r = parseInt(hex.substring(0,2), 16);
          const g = parseInt(hex.substring(2,4), 16);
          const b = parseInt(hex.substring(4,6), 16);
          const bgColor = `rgba(${r}, ${g}, ${b}, 0.5)`; 

          return `
          <div class="relative flex flex-col items-center justify-end z-10 shrink-0" style="margin-left: ${index === 0 ? 0 : ml}px; width: 112px;">
            
            <div class="absolute bottom-0 left-0 w-full flex flex-col items-center justify-end pointer-events-none z-0">
              <div class="relative flex items-center justify-center w-28 h-32 shrink-0 border border-transparent overflow-visible">
                 <svg width="100%" height="100%" viewBox="0 0 100 250" preserveAspectRatio="xMidYMid meet" class="absolute inset-0 overflow-visible z-0">
                   ${linesHtml}
                   ${clefHtml}
                 </svg>
              </div>
              <div class="w-0 h-0 border-l-[8px] border-r-[8px] border-b-[12px] border-transparent shrink-0"></div>
              <div class="w-1 h-14 -mt-1 border-transparent shrink-0"></div>
            </div>

            <div id="balloon-${note.id}" 
                 class="balloon-btn relative flex flex-col items-center transition-all duration-200 cursor-pointer opacity-90 hover:opacity-100 z-10 w-full pointer-events-auto"
                 onclick="handleGuess('${note.id}')">
              
              <div class="intro-label absolute -top-12 left-1/2 -translate-x-1/2 bg-white/95 border-2 border-blue-300 rounded-lg px-3 py-1 font-black text-sm text-blue-800 opacity-0 transition-all duration-300 pointer-events-none z-[60] whitespace-nowrap shadow-md transform scale-90">
                ${note.label}
              </div>

              <div class="relative flex items-center justify-center w-28 h-32 shrink-0 rounded-[50%] shadow-[inset_-5px_-5px_15px_rgba(0,0,0,0.1),2px_2px_5px_rgba(0,0,0,0.2)] overflow-visible border border-white/60 backdrop-blur-[2px]" style="background-color: ${bgColor};">
                <div class="absolute inset-2 bg-white/20 rounded-[50%] pointer-events-none"></div>
                <svg width="100%" height="100%" viewBox="0 0 100 250" preserveAspectRatio="xMidYMid meet" class="absolute inset-0 z-0 overflow-visible pointer-events-none">
                  ${noteHtml}
                </svg>
                <div class="absolute top-2 left-3 w-5 h-7 bg-white/50 rounded-full transform rotate-45 z-10 pointer-events-none"></div>
              </div>
              <div class="w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-b-[12px] shrink-0 opacity-90 pointer-events-none" style="border-bottom-color: ${note.color};"></div>
              <div class="w-1 h-14 border-l-2 border-gray-600/60 -mt-1 rounded-bl-full shrink-0 pointer-events-none"></div>
            </div>

          </div>
        `}).join('');

        return `
          <div class="w-full flex flex-nowrap justify-center items-end relative shrink-0" style="transform: scale(${scale}); transform-origin: bottom center; margin-top: ${rows.length > 1 && rowIndex > 0 ? mt + 'px' : '0'}; z-index: ${30 - rowIndex};">
            ${rowHtml}
          </div>
        `;
      }).join('');

      container.innerHTML = balloonsHtml;
    }

    function updateBalloonsState(status, correctNoteId) {
      const balloons = document.querySelectorAll('.balloon-btn');
      balloons.forEach(b => {
        const noteId = b.id.replace('balloon-', '');
        b.className = `balloon-btn relative flex flex-col items-center transition-all duration-200 cursor-pointer z-10 w-full`;
        
        if (status === 'playing') {
          b.classList.add('opacity-90', 'pointer-events-auto', 'hover:brightness-125', 'active:scale-95');
        } else if (status === 'intro') {
          b.classList.add('opacity-90', 'pointer-events-none');
        } else {
          b.classList.add('pointer-events-none');
          if (status === 'correct' && noteId === correctNoteId) {
            b.classList.add('animate-flyAway');
          } else if ((status === 'wrong' || status === 'timeout') && noteId === correctNoteId) {
            b.classList.add('animate-shakeNote', 'z-40', 'opacity-100');
          } else {
            b.classList.add('opacity-50');
          }
        }
      });
    }

    // === 音名紹介（イントロ）シーケンス ===
    function playIntroSequence(targetNotes) {
      state.gameState = 'intro';
      let i = 0;
      
      setCatMessage('位置を確認してね！\n（画面クリックでスキップ）');
      const app = document.getElementById('game-app');
      const startBtnContainer = document.getElementById('intro-start-container');
      
      // スキップ処理
      const skipIntro = (e) => {
        if (e && e.target.closest('button')) return;
        if (state.gameState !== 'intro' || isPaused) return;
        
        if (introTimerId) clearTimeout(introTimerId);
        app.removeEventListener('click', skipIntro);
        
        // 全音のラベルを表示させ、同時にすべての音を鳴らす
        targetNotes.forEach(note => {
          const balloon = document.getElementById(`balloon-${note.id}`);
          if (balloon) {
            const label = balloon.querySelector('.intro-label');
            if (label) {
              label.classList.remove('opacity-0', 'scale-90');
              label.classList.add('opacity-100', 'scale-100', '-translate-y-2');
            }
          }
          // ピアノ音と読み上げを発声
          playNoteAudioAndSpeech(note);
        });
        showStartButton();
      };
      
      app.addEventListener('click', skipIntro);

      function showStartButton() {
        setCatMessage('準備ができたら\nスタートを押してね！');
        startBtnContainer.classList.remove('hidden');
      }

      // 【修正】スタートボタンを押した瞬間にBGMを開始
      window.finishIntroFromButton = function() {
        startBtnContainer.classList.add('hidden');
        app.removeEventListener('click', skipIntro);
        
        document.querySelectorAll('.intro-label').forEach(el => {
          el.classList.add('opacity-0', 'scale-90');
          el.classList.remove('opacity-100', 'scale-100', '-translate-y-2');
        });
        
        setCatMessage('第1問！');
        state.gameState = 'playing';
        
        // ★ここでBGMを開始！
        startBGM();

        setTimeout(() => {
          if (state.gameState !== 'playing') return;
          state.currentNote = state.questionList[0];
          state.showNote = true;
          renderStaffNote(state.currentNote);
          updateBalloonsState('playing', null);
          setCatMessage('どれかな？');
          
          const el = document.getElementById('ui-points');
          el.innerText = '1000';
          el.className = 'bg-orange-400 text-white font-bold px-3 py-0.5 rounded shadow-inner min-w-[3rem] text-center transition-colors';

          state.startTime = Date.now();
          if(rAF_TimerId) cancelAnimationFrame(rAF_TimerId);
          updatePointsDisplay();
        }, 1000);
      };

      function nextNote() {
        if (state.gameState !== 'intro') return;
        
        if (isPaused) {
          introTimerId = setTimeout(nextNote, 100);
          return;
        }
        
        if (i >= targetNotes.length) {
          app.removeEventListener('click', skipIntro);
          showStartButton();
          return;
        }
        
        const note = targetNotes[i];
        const balloon = document.getElementById(`balloon-${note.id}`);
        if (balloon) {
          const label = balloon.querySelector('.intro-label');
          if (label) {
            label.classList.remove('opacity-0', 'scale-90');
            label.classList.add('opacity-100', 'scale-100', '-translate-y-2');
          }
          balloon.classList.add('brightness-125');
          
          // ピアノ音と読み上げ音声を流す
          playNoteAudioAndSpeech(note);

          setTimeout(() => {
            if (balloon) balloon.classList.remove('brightness-125');
          }, 400);
        }
        
        i++;
        introTimerId = setTimeout(nextNote, 800); // 聞き取りやすいよう少し間隔を広げました
      }

      introTimerId = setTimeout(nextNote, 500);
    }

    // === ゲームロジック ===
    function generateQuestions(mode, stage) {
      const stageNotesArr = mode === 'range' ? RANGE_STAGES[stage - 1] : CHALLENGE_STAGES[stage - 1];
      const targetNotes = stageNotesArr.map(id => ALL_NOTES[id]);
      
      let list = [];
      
      if (targetNotes.length > 10) {
        let newNotes = [];
        let oldNotes = [...targetNotes];
        
        if (mode === 'challenge' && stage > 1) {
          const prevStageNotesArr = CHALLENGE_STAGES[stage - 2];
          newNotes = targetNotes.filter(n => !prevStageNotesArr.includes(n.id));
          oldNotes = targetNotes.filter(n => prevStageNotesArr.includes(n.id));
        }
        
        oldNotes.sort(() => Math.random() - 0.5);
        
        let selectedNotes = [...newNotes];
        const needed = 10 - selectedNotes.length;
        selectedNotes = selectedNotes.concat(oldNotes.slice(0, needed));
        
        selectedNotes.sort(() => Math.random() - 0.5);
        list = selectedNotes;
        
      } else {
        let pool = [...targetNotes];
        
        for (let i = 0; i < 10; i++) {
          if (pool.length === 0) {
            pool = [...targetNotes];
          }
          
          let validPool = pool;
          if (i > 0) {
            const prevId = list[i - 1].id;
            validPool = pool.filter(n => n.id !== prevId);
            
            if (validPool.length === 0) {
               pool = [...targetNotes];
               validPool = pool.filter(n => n.id !== prevId);
            }
          }
          
          const pickedIndex = Math.floor(Math.random() * validPool.length);
          const picked = validPool[pickedIndex];
          list.push(picked);
          
          const removeIndex = pool.findIndex(n => n.id === picked.id);
          if (removeIndex !== -1) {
            pool.splice(removeIndex, 1);
          }
        }
      }
      
      return list;
    }

    function updatePointsDisplay() {
      if (state.gameState === 'playing' && state.showNote && state.feedback === null) {
        const elapsed = Date.now() - state.startTime;
        const nextPoints = Math.max(0, 1000 - Math.floor(elapsed / 10));
        
        const el = document.getElementById('ui-points');
        el.innerText = String(nextPoints).padStart(3, '0');
        el.className = nextPoints < 300 
          ? 'bg-red-500 text-white font-bold px-3 py-0.5 rounded shadow-inner min-w-[3rem] text-center transition-colors' 
          : 'bg-orange-400 text-white font-bold px-3 py-0.5 rounded shadow-inner min-w-[3rem] text-center transition-colors';
        
        if (nextPoints <= 0) {
          state.currentPoints = 0;
          handleTimeout();
        } else {
          rAF_TimerId = requestAnimationFrame(updatePointsDisplay);
        }
      }
    }

    window.startGame = function(mode, targetStage) {
      initAudio();
      document.getElementById('overlay-title').classList.add('hidden');
      document.getElementById('overlay-result').classList.add('hidden');
      document.getElementById('overlay-allclear').classList.add('hidden');
      document.getElementById('overlay-pause').classList.add('hidden');

      state.mode = mode;
      state.stage = targetStage;
      state.score = 0;
      state.questionCount = 1;
      state.gameState = 'intro';
      state.feedback = null;
      state.showNote = false;
      isPaused = false;

      const stageDisplay = mode === 'range' ? `音域 ${state.stage}` : `Ch. ${state.stage}`;
      document.getElementById('ui-stage').innerText = stageDisplay;
      
      updateScore(0);
      
      const stageNotesArr = mode === 'range' ? RANGE_STAGES[targetStage - 1] : CHALLENGE_STAGES[targetStage - 1];
      const targetNotes = stageNotesArr.map(id => ALL_NOTES[id]);

      state.questionList = generateQuestions(mode, targetStage);
      
      generateBalloons(targetNotes);
      document.getElementById('staff-container').classList.remove('hidden');
      renderStaffNote(null);
      
      // 【修正】ここではまだBGMを鳴らさない（stop処理のみ）
      stopBGM();

      updateBalloonsState('intro', null);
      
      playIntroSequence(targetNotes);
    }

    window.handleGuess = function(noteId) {
      if (state.gameState !== 'playing' || state.feedback !== null || !state.showNote) return;
      
      const elapsed = Date.now() - state.startTime;
      const actualPoints = Math.max(0, 1000 - Math.floor(elapsed / 10));
      const isCorrect = noteId === state.currentNote.id;

      state.feedback = isCorrect ? 'correct' : 'wrong';

      if (isCorrect) {
        const randomX = Math.floor(Math.random() * 300) - 150;
        const b = document.getElementById(`balloon-${noteId}`);
        
        showAddedScore(actualPoints, `balloon-${noteId}`);

        b.style.setProperty('--fly-x', `${randomX}px`);
        b.style.setProperty('--fly-rot', `${randomX * 0.15}deg`);

        playCorrectSound(ALL_NOTES[noteId]);
        state.score += actualPoints;
        updateScore(state.score);
        setCatMessage('正解！', true, false);
      } else {
        playWrongSound();
        setCatMessage('残念！', false, true);
      }

      updateBalloonsState(state.feedback, state.currentNote.id);
      scheduleNextQuestion();
    }

    function handleTimeout() {
      state.feedback = 'wrong';
      playWrongSound();
      setCatMessage('時間切れ！', false, true);
      updateBalloonsState('timeout', state.currentNote.id);
      scheduleNextQuestion();
    }

    function scheduleNextQuestion() {
      setTimeout(() => {
        if (state.questionCount >= 10) {
          showResultScreen();
        } else {
          state.questionCount++;
          state.feedback = null;
          state.showNote = false;

          document.getElementById('ui-added-score').classList.add('hidden');
          renderStaffNote(null);
          setCatMessage(`第${state.questionCount}問！`);
          
          const stageNotesArr = state.mode === 'range' ? RANGE_STAGES[state.stage - 1] : CHALLENGE_STAGES[state.stage - 1];
          const targetNotes = stageNotesArr.map(id => ALL_NOTES[id]);
          generateBalloons(targetNotes);

          setTimeout(() => {
            state.currentNote = state.questionList[state.questionCount - 1];
            state.showNote = true;
            renderStaffNote(state.currentNote);
            updateBalloonsState('playing', null);
            setCatMessage('どれかな？');
            
            state.startTime = Date.now();
            if(rAF_TimerId) cancelAnimationFrame(rAF_TimerId);
            updatePointsDisplay();
          }, 1000);
        }
      }, 1500);
    }

    function showResultScreen() {
      state.gameState = 'result';
      stopBGM();
      document.getElementById('staff-container').classList.add('hidden');
      
      const elResult = document.getElementById('overlay-result');
      const elResultContent = document.getElementById('result-content');
      const elConfetti = document.getElementById('confetti-container');
      
      elResult.classList.remove('hidden');

      const clearScore = 8000;
      const superScore = 9000;
      
      if (state.score > state.scores[state.mode][state.stage - 1]) {
        state.scores[state.mode][state.stage - 1] = state.score;
      }
      
      if (state.score >= clearScore) {
        if (state.mode === 'challenge') {
          if (state.stage + 1 > state.maxUnlockedChallenge && state.stage < 12) {
            state.maxUnlockedChallenge = state.stage + 1;
          }
        }
      }
      saveProgress();

      const modeName = state.mode === 'range' ? '音域モード' : 'チャレンジモード';
      let html = `
        <h2 class="text-2xl md:text-3xl font-black text-gray-800 mb-2">${modeName}<br/>ステージ ${state.stage} 終了！</h2>
        <div class="text-6xl font-black text-orange-500 mb-4">${state.score} <span class="text-2xl text-gray-600">点</span></div>
      `;
      
      if (state.score >= clearScore) {
        let btnColor = '';
        if (state.score >= superScore) {
          playSuperFanfare();
          elConfetti.innerHTML = Array.from({length: 60}).map(() => {
            const c = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#FFD700'][Math.floor(Math.random() * 6)];
            return `<div class="absolute w-3 h-3 animate-confetti" style="left: ${Math.random() * 100}%; top: -10%; background-color: ${c}; animation-delay: ${Math.random() * 3}s; animation-duration: ${1.5 + Math.random() * 2}s; border-radius: ${Math.random() > 0.5 ? '50%' : '0'}"></div>`;
          }).join('');
          elConfetti.classList.remove('hidden');
          
          html += `<p class="text-2xl font-black text-yellow-500 mb-6 animate-pulse">大・大・大成功！！<br/>パーフェクト級だね！</p>`;
          btnColor = 'bg-yellow-400 hover:bg-yellow-500 border-b-4 border-yellow-600 shadow-[0_4px_0_#ca8a04]';
        } else {
          playFanfare();
          elConfetti.classList.add('hidden');
          html += `<p class="text-xl font-bold text-green-500 mb-6">目標の${clearScore}点達成！<br/>おめでとう！</p>`;
          btnColor = 'bg-green-500 hover:bg-green-600 border-b-4 border-green-700 shadow-[0_4px_0_#15803d]';
        }

        const btnNextText = (state.mode === 'challenge' && state.stage === 12) ? 'エンディングへ！' : '次のステージへ！';
        const nextAction = (state.mode === 'challenge' && state.stage === 12) ? 'showAllClearScreen()' : 'handleNextStage()';

        html += `
          <div class="flex flex-col gap-3">
            <button class="w-full py-4 ${btnColor} text-white text-2xl font-bold rounded-xl active:translate-y-[4px] active:shadow-none transition-all" onclick="${nextAction}">${btnNextText}</button>
            <button class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold rounded-xl shadow-[0_4px_0_#1d4ed8] active:translate-y-[4px] active:shadow-none transition-all" onclick="startGame('${state.mode}', ${state.stage})">もういちどプレイ</button>
            <button class="w-full py-3 bg-gray-400 hover:bg-gray-500 text-white text-xl font-bold rounded-xl shadow-[0_4px_0_#4b5563] active:translate-y-[4px] active:shadow-none transition-all" onclick="showTitleScreen(); showStageSelect('${state.mode}');">ステージ選択へ戻る</button>
          </div>
        `;

      } else {
        playFailSound();
        elConfetti.classList.add('hidden');
        html += `
          <p class="text-lg font-bold text-red-500 mb-6">${clearScore}点に届かなかった...<br/>もう一度挑戦しよう！</p>
          <div class="flex flex-col gap-3">
            <button class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold rounded-xl shadow-[0_4px_0_#1d4ed8] active:translate-y-[4px] active:shadow-none transition-all" onclick="startGame('${state.mode}', ${state.stage})">もういちど挑戦する</button>
            <button class="w-full py-3 bg-gray-400 hover:bg-gray-500 text-white text-xl font-bold rounded-xl shadow-[0_4px_0_#4b5563] active:translate-y-[4px] active:shadow-none transition-all" onclick="showTitleScreen(); showStageSelect('${state.mode}');">ステージ選択へ戻る</button>
          </div>
        `;
      }
      elResultContent.innerHTML = html;
    }

    window.handleNextStage = function() {
      if (state.mode === 'range') {
        if (state.stage < 5) {
          startGame('range', state.stage + 1);
        } else {
          showTitleScreen();
          showStageSelect('range');
        }
      } else if (state.mode === 'challenge') {
        if (state.stage < 12) {
          startGame('challenge', state.stage + 1);
        } else {
          showAllClearScreen();
        }
      }
    }

    function showAllClearScreen() {
      document.getElementById('overlay-result').classList.add('hidden');
      const elAllClear = document.getElementById('overlay-allclear');
      elAllClear.classList.remove('hidden');

      const elConfetti = document.getElementById('allclear-confetti');
      elConfetti.innerHTML = Array.from({length: 150}).map(() => {
        const c = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#FFD700', '#FF1493', '#00FFFF'][Math.floor(Math.random() * 8)];
        return `<div class="absolute w-4 h-4 animate-confetti" style="left: ${Math.random() * 100}%; top: -10%; background-color: ${c}; animation-delay: ${Math.random() * 5}s; animation-duration: ${2 + Math.random() * 3}s; border-radius: ${Math.random() > 0.5 ? '50%' : '0'}"></div>`;
      }).join('');
      
      playSuperFanfare();
    }

  </script>
</body>
</html>
